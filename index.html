<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSBiA - ZIP com Senha</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        .header { text-align: center; color: white; margin-bottom: 30px; }
        .logo {
            width: 60px; height: 60px; background: white; border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 15px; font-size: 24px; font-weight: bold; color: #667eea;
        }
        .header h1 { font-size: 1.8rem; margin-bottom: 5px; }
        .card {
            background: white; border-radius: 20px; padding: 25px;
            margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .upload-area {
            border: 2px dashed #ddd; border-radius: 15px; padding: 40px;
            text-align: center; cursor: pointer; transition: all 0.3s;
            background: #f9f9f9;
        }
        .upload-area:hover { border-color: #667eea; background: #f0eef9; }
        .upload-icon { font-size: 50px; margin-bottom: 10px; }
        .file-list { margin-top: 15px; max-height: 200px; overflow-y: auto; }
        .file-item {
            background: #f5f5f5; padding: 10px; margin-bottom: 8px;
            border-radius: 10px; display: flex; justify-content: space-between;
            align-items: center;
        }
        .remove-file { color: red; cursor: pointer; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; }
        .password-wrapper { display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 10px; }
        .btn-icon { padding: 0 15px; background: #f0f0f0; border: none; border-radius: 10px; cursor: pointer; }
        .btn-primary {
            width: 100%; padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; border: none; border-radius: 12px;
            font-size: 16px; font-weight: bold; cursor: pointer;
        }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
        .progress-bar { width: 100%; height: 30px; background: #f0f0f0; border-radius: 15px; overflow: hidden; margin: 10px 0; }
        .progress-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #667eea, #764ba2); transition: width 0.3s; display: flex; align-items: center; justify-content: center; color: white; font-size: 12px; }
        .result-info { background: #f5f5f5; padding: 15px; border-radius: 12px; margin: 15px 0; }
        .result-row { display: flex; justify-content: space-between; margin-bottom: 10px; flex-wrap: wrap; }
        .result-actions { display: flex; gap: 10px; }
        .btn-download { flex: 1; padding: 12px; background: #10b981; color: white; border: none; border-radius: 10px; cursor: pointer; }
        .btn-secondary { flex: 1; padding: 12px; background: #6b7280; color: white; border: none; border-radius: 10px; cursor: pointer; }
        .footer { text-align: center; color: white; margin-top: 20px; font-size: 12px; }
        @media (max-width: 600px) { .card { padding: 15px; } .result-actions { flex-direction: column; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">📦</div>
            <h1>BSBiA - ZIP com Senha</h1>
            <p>Arquivos protegidos - O ZIP só abre com a senha</p>
        </div>

        <div class="card">
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">📁</div>
                <h3>Clique ou arraste arquivos</h3>
                <input type="file" id="fileInput" multiple style="display: none">
            </div>
            <div id="fileList" class="file-list"></div>
        </div>

        <div class="card">
            <div class="form-group">
                <label>🔒 Senha do ZIP</label>
                <div class="password-wrapper">
                    <input type="password" id="password" placeholder="Digite a senha">
                    <button class="btn-icon" id="togglePassword">👁️</button>
                    <button class="btn-icon" id="generatePassword">🎲</button>
                </div>
            </div>
            <div class="form-group">
                <label>📝 Nome do ZIP</label>
                <input type="text" id="outputName" placeholder="meu_arquivo">
            </div>
            <button id="compactBtn" class="btn-primary" disabled>📦 Criar ZIP Protegido</button>
        </div>

        <div id="progressCard" class="card" style="display: none;">
            <div class="progress-bar"><div id="progressFill" class="progress-fill">0%</div></div>
            <p id="progressText" style="text-align: center;">Enviando...</p>
        </div>

        <div id="resultCard" class="card" style="display: none;">
            <h3 style="color: #10b981;">✅ ZIP Criado!</h3>
            <div class="result-info">
                <div class="result-row"><strong>Arquivo:</strong><span id="resultFilename"></span></div>
                <div class="result-row"><strong>Senha:</strong><span id="resultPassword"></span><button id="copyPassword" class="btn-icon">Copiar</button></div>
                <div class="result-row"><strong>Tamanho:</strong><span id="resultSize"></span></div>
            </div>
            <div class="result-actions">
                <button id="downloadBtn" class="btn-download">⬇️ Baixar ZIP</button>
                <button id="newFileBtn" class="btn-secondary">🔄 Novo</button>
            </div>
        </div>

        <div class="footer">
            <p>BSBiA | O arquivo ZIP exige senha para ser aberto</p>
        </div>
    </div>

    <script>
        let selectedFiles = [];
        let isProcessing = false;

        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const fileList = document.getElementById('fileList');
        const passwordInput = document.getElementById('password');
        const togglePasswordBtn = document.getElementById('togglePassword');
        const generatePasswordBtn = document.getElementById('generatePassword');
        const outputNameInput = document.getElementById('outputName');
        const compactBtn = document.getElementById('compactBtn');
        const progressCard = document.getElementById('progressCard');
        const resultCard = document.getElementById('resultCard');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');

        function formatBytes(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        function generateRandomPassword() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
            let password = '';
            for (let i = 0; i < 8; i++) password += chars.charAt(Math.floor(Math.random() * chars.length));
            return password;
        }

        function showNotification(msg, type = 'success') {
            const div = document.createElement('div');
            div.textContent = msg;
            div.style.cssText = `position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: ${type === 'error' ? '#ef4444' : '#10b981'}; color: white; padding: 10px 20px; border-radius: 50px; z-index: 1000;`;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 3000);
        }

        function updateFileList() {
            if (selectedFiles.length === 0) {
                fileList.innerHTML = '';
                return;
            }
            fileList.innerHTML = selectedFiles.map((f, i) => `
                <div class="file-item">
                    <span>📄 ${f.name} (${formatBytes(f.size)})</span>
                    <span class="remove-file" data-index="${i}">✖️</span>
                </div>
            `).join('');
            document.querySelectorAll('.remove-file').forEach(btn => {
                btn.onclick = (e) => {
                    const idx = parseInt(e.target.dataset.index);
                    selectedFiles.splice(idx, 1);
                    updateFileList();
                    compactBtn.disabled = selectedFiles.length === 0;
                };
            });
            compactBtn.disabled = selectedFiles.length === 0;
        }

        async function createZip() {
            if (selectedFiles.length === 0) {
                showNotification('Selecione arquivos!', 'error');
                return;
            }
            const password = passwordInput.value;
            if (!password) {
                showNotification('Digite uma senha!', 'error');
                return;
            }
            if (isProcessing) return;
            isProcessing = true;
            compactBtn.disabled = true;
            progressCard.style.display = 'block';
            resultCard.style.display = 'none';
            
            let progress = 0;
            const interval = setInterval(() => {
                progress += 10;
                if (progress >= 90) clearInterval(interval);
                progressFill.style.width = `${progress}%`;
                progressFill.textContent = `${progress}%`;
            }, 200);
            
            try {
                const formData = new FormData();
                selectedFiles.forEach(file => formData.append('arquivos', file));
                formData.append('senha', password);
                formData.append('nome_saida', outputNameInput.value);
                
                progressText.textContent = 'Enviando para o servidor...';
                const response = await fetch('http://localhost:5000/compactar', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                clearInterval(interval);
                progressFill.style.width = '100%';
                progressFill.textContent = '100%';
                progressText.textContent = 'Concluído!';
                
                if (data.success) {
                    setTimeout(() => {
                        progressCard.style.display = 'none';
                        document.getElementById('resultFilename').textContent = data.arquivo;
                        document.getElementById('resultPassword').textContent = data.senha;
                        document.getElementById('resultSize').textContent = data.tamanho;
                        resultCard.style.display = 'block';
                        showNotification('✅ ZIP criado! O arquivo exige senha para abrir.');
                        
                        document.getElementById('downloadBtn').onclick = () => {
                            window.location.href = `http://localhost:5000${data.download_url}`;
                        };
                        document.getElementById('newFileBtn').onclick = () => {
                            selectedFiles = [];
                            updateFileList();
                            passwordInput.value = '';
                            outputNameInput.value = '';
                            resultCard.style.display = 'none';
                            compactBtn.disabled = true;
                        };
                        document.getElementById('copyPassword').onclick = () => {
                            navigator.clipboard.writeText(data.senha);
                            showNotification('Senha copiada!');
                        };
                    }, 500);
                } else {
                    throw new Error(data.error);
                }
            } catch (err) {
                clearInterval(interval);
                progressCard.style.display = 'none';
                showNotification('Erro: ' + err.message + '. Verifique se o servidor está rodando.', 'error');
            } finally {
                isProcessing = false;
                compactBtn.disabled = selectedFiles.length === 0;
            }
        }

        uploadArea.onclick = () => fileInput.click();
        fileInput.onchange = (e) => {
            if (e.target.files.length) {
                selectedFiles.push(...Array.from(e.target.files));
                updateFileList();
                showNotification(`${e.target.files.length} arquivo(s) adicionado(s)`);
            }
            fileInput.value = '';
        };
        
        uploadArea.ondragover = (e) => { e.preventDefault(); uploadArea.style.borderColor = '#667eea'; };
        uploadArea.ondragleave = () => { uploadArea.style.borderColor = '#ddd'; };
        uploadArea.ondrop = (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = '#ddd';
            const files = Array.from(e.dataTransfer.files);
            if (files.length) {
                selectedFiles.push(...files);
                updateFileList();
                showNotification(`${files.length} arquivo(s) adicionado(s)`);
            }
        };
        
        togglePasswordBtn.onclick = () => {
            const type = passwordInput.type === 'password' ? 'text' : 'password';
            passwordInput.type = type;
            togglePasswordBtn.textContent = type === 'password' ? '👁️' : '🙈';
        };
        generatePasswordBtn.onclick = () => {
            passwordInput.value = generateRandomPassword();
            showNotification('Senha gerada!');
        };
        compactBtn.onclick = createZip;
    </script>
</body>
</html>
