<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>BSBiA - Compactador ZIP com Senha</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <!-- 🔥 BOTÃO VOLTAR FIXO -->
    <button id="btnVoltarPainel">⬅ Voltar</button>

    <div class="container">
        
        <div class="logo-bg">
            <img src="{{ url_for('static', filename='BrasilIALogo.png') }}" alt="Logo">
        </div>
        
        <div class="card">
            <h1>🔒 Compactador ZIP com Senha</h1>

            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">📁</div>
                <p>Clique ou arraste arquivos aqui</p>
                <input type="file" id="fileInput" multiple style="display: none">
            </div>

            <div id="fileList" class="file-list"></div>

            <div class="form-group">
                <label>🔐 Senha</label>
                <input type="password" id="password" placeholder="Digite a senha">
                <button type="button" id="generatePassword">🎲 Gerar senha</button>
            </div>

            <div class="form-group">
                <label>📝 Nome do ZIP (opcional)</label>
                <input type="text" id="outputName" placeholder="ex: meus_arquivos">
            </div>

            <button id="compactBtn" disabled>📦 Criar ZIP Protegido</button>

            <div id="progress" class="progress" style="display: none;">
                <div class="progress-bar">
                    <div class="progress-fill"></div>
                </div>
                <p>Enviando...</p>
            </div>

            <div id="result" class="result" style="display: none;"></div>
        </div>
    </div>

    <!-- 🔥 SCRIPT VOLTAR -->
    <script>
        document.getElementById("btnVoltarPainel").addEventListener("click", () => {
            window.location.href = "https://painel-controller.vercel.app/";
        });
    </script>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
