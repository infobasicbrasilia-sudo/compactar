<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compactador com Senha - Múltiplos Arquivos</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container { max-width: 800px; margin: 0 auto; }
        
        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        header h1 { font-size: 2rem; margin-bottom: 10px; }
        
        .card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        
        .upload-area {
            border: 2px dashed #ddd;
            border-radius: 15px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #f5f5f5;
            margin-bottom: 20px;
        }
        
        .upload-area:hover { border-color: #4CAF50; background: #e8f5e9; }
        .upload-area.drag-over { border-color: #4CAF50; background: #e8f5e9; transform: scale(1.02); }
        .upload-icon { font-size: 3rem; display: block; margin-bottom: 10px; }
        
        .lista-arquivos {
            margin-top: 15px;
            max-height: 200px;
            overflow-y: auto;
        }
        
        .arquivo-item {
            background: #f5f5f5;
            padding: 10px;
            margin-bottom: 5px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .remove-arquivo {
            color: #f44336;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.2rem;
        }
        
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; }
        
        input[type="password"], input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 1rem;
        }
        
        .senha-input-group { display: flex; gap: 10px; }
        .senha-input-group input { flex: 1; }
        
        .btn-icon {
            padding: 0 15px;
            background: #f5f5f5;
            border: 1px solid #ddd;
            border-radius: 10px;
            cursor: pointer;
        }
        
        .btn-primary {
            width: 100%;
            padding: 15px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
        }
        
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .progresso { display: none; margin-top: 20px; }
        .progress-bar {
            width: 100%;
            height: 40px;
            background: #f5f5f5;
            border-radius: 20px;
            overflow: hidden;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #4CAF50, #45a049);
            transition: width 0.3s;
        }
        
        .resultado { display: none; }
        .info-item {
            display: flex;
            justify-content: space-between;
            padding: 12px;
            background: #f5f5f5;
            margin-bottom: 10px;
            border-radius: 10px;
        }
        
        .aviso {
            background: #fff3cd;
            border: 1px solid #ffc107;
            color: #856404;
            padding: 12px;
            border-radius: 10px;
            margin-top: 15px;
            font-size: 14px;
        }
        
        @media (max-width: 600px) {
            .info-item { flex-direction: column; gap: 8px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔐 Compactador com Senha</h1>
            <p>Selecione vários arquivos - Proteção REAL com senha</p>
        </header>

        <div class="card">
            <div class="upload-area" id="uploadArea">
                <div class="upload-content">
                    <span class="upload-icon">📁</span>
                    <p>Clique ou arraste arquivos aqui</p>
                    <small>Selecione um ou mais arquivos</small>
                </div>
                <input type="file" id="fileInput" multiple style="display: none">
            </div>

            <div id="listaArquivos" class="lista-arquivos"></div>

            <div class="form-group">
                <label>🔒 Senha de Proteção:</label>
                <div class="senha-input-group">
                    <input type="password" id="senhaInput" placeholder="Digite sua senha">
                    <button type="button" class="btn-icon" id="toggleSenhaBtn">👁️</button>
                    <button type="button" class="btn-icon" id="gerarSenhaBtn">🎲</button>
                </div>
            </div>

            <div class="form-group">
                <label>📝 Nome do arquivo (opcional):</label>
                <input type="text" id="nomeSaida" placeholder="ex: meus_arquivos">
            </div>

            <button id="compactarBtn" class="btn-primary" disabled>🚀 Compactar e Proteger</button>
        </div>

        <div id="progressoDiv" class="progresso">
            <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
            <p class="progress-text" style="text-align:center; margin-top:10px; color:white;">Compactando...</p>
        </div>

        <div id="resultadoDiv" class="card resultado">
            <h3 style="color:#4CAF50">✅ Sucesso!</h3>
            <div class="info-item"><strong>📦 Arquivo:</strong><span id="nomeArquivoSpan"></span></div>
            <div class="info-item"><strong>🔒 Senha:</strong><span id="senhaResultadoSpan"></span><button id="copiarSenhaBtn" class="btn-icon" style="margin-left:10px;">📋</button></div>
            <div class="info-item"><strong>📊 Tamanho:</strong><span id="tamanhoSpan"></span></div>
            <div class="info-item"><strong>⚙️ Método:</strong><span id="metodoSpan"></span></div>
            <div id="avisoDiv" class="aviso"></div>
            <button id="downloadBtn" class="btn-primary" style="margin-top:15px;">⬇️ Download</button>
            <button id="novoBtn" class="btn-primary" style="margin-top:10px; background:#666;">🔄 Compactar Outros Arquivos</button>
        </div>
    </div>

    <script>
        let arquivosSelecionados = [];
        let processando = false;

        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const listaArquivos = document.getElementById('listaArquivos');
        const compactarBtn = document.getElementById('compactarBtn');
        const senhaInput = document.getElementById('senhaInput');
        const toggleSenhaBtn = document.getElementById('toggleSenhaBtn');
        const gerarSenhaBtn = document.getElementById('gerarSenhaBtn');
        const progressoDiv = document.getElementById('progressoDiv');
        const resultadoDiv = document.getElementById('resultadoDiv');
        const progressFill = document.getElementById('progressFill');

        function formatarBytes(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const unidades = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + unidades[i];
        }

        function gerarSenhaAleatoria() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*';
            let senha = '';
            for (let i = 0; i < 12; i++) {
                senha += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return senha;
        }

        function exibirNotificacao(mensagem, tipo) {
            const notif = document.createElement('div');
            notif.textContent = mensagem;
            notif.style.cssText = `
                position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
                background: ${tipo === 'error' ? '#f44336' : '#4CAF50'};
                color: white; padding: 12px 24px; border-radius: 50px;
                z-index: 1000; animation: slideUp 0.3s;
            `;
            document.body.appendChild(notif);
            setTimeout(() => notif.remove(), 3000);
        }

        function atualizarLista() {
            listaArquivos.innerHTML = '';
            arquivosSelecionados.forEach((arquivo, index) => {
                const div = document.createElement('div');
                div.className = 'arquivo-item';
                div.innerHTML = `
                    <span>📄 ${arquivo.name} (${formatarBytes(arquivo.size)})</span>
                    <span class="remove-arquivo" data-index="${index}">✖️</span>
                `;
                listaArquivos.appendChild(div);
            });
            
            document.querySelectorAll('.remove-arquivo').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const index = parseInt(e.target.dataset.index);
                    arquivosSelecionados.splice(index, 1);
                    atualizarLista();
                    compactarBtn.disabled = arquivosSelecionados.length === 0;
                });
            });
            
            compactarBtn.disabled = arquivosSelecionados.length === 0;
        }

        function processarArquivos(files) {
            arquivosSelecionados.push(...files);
            atualizarLista();
            exibirNotificacao(`✅ ${files.length} arquivo(s) adicionado(s)`, 'success');
        }

        uploadArea.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) processarArquivos(Array.from(e.target.files));
        });

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('drag-over');
        });
        uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('drag-over'));
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('drag-over');
            if (e.dataTransfer.files.length > 0) processarArquivos(Array.from(e.dataTransfer.files));
        });

        toggleSenhaBtn.addEventListener('click', () => {
            const type = senhaInput.type === 'password' ? 'text' : 'password';
            senhaInput.type = type;
            toggleSenhaBtn.textContent = type === 'password' ? '👁️' : '🙈';
        });

        gerarSenhaBtn.addEventListener('click', () => {
            senhaInput.value = gerarSenhaAleatoria();
            exibirNotificacao('🔑 Senha gerada!', 'success');
        });

        async function realizarCompactacao() {
            if (arquivosSelecionados.length === 0) {
                exibirNotificacao('❌ Selecione pelo menos um arquivo!', 'error');
                return;
            }
            
            const senha = senhaInput.value;
            if (!senha) {
                exibirNotificacao('❌ Digite uma senha!', 'error');
                return;
            }
            
            if (processando) return;
            processando = true;
            compactarBtn.disabled = true;
            
            const formData = new FormData();
            arquivosSelecionados.forEach(arquivo => {
                formData.append('arquivos', arquivo);
            });
            formData.append('senha', senha);
            formData.append('nome_saida', document.getElementById('nomeSaida').value || '');
            
            progressoDiv.style.display = 'block';
            resultadoDiv.style.display = 'none';
            
            let progresso = 0;
            const intervalo = setInterval(() => {
                progresso += 10;
                if (progresso >= 90) clearInterval(intervalo);
                progressFill.style.width = progresso + '%';
            }, 100);
            
            try {
                const resposta = await fetch('/compactar', { method: 'POST', body: formData });
                const dados = await resposta.json();
                
                clearInterval(intervalo);
                progressFill.style.width = '100%';
                
                if (resposta.ok && dados.success) {
                    setTimeout(() => {
                        progressoDiv.style.display = 'none';
                        document.getElementById('nomeArquivoSpan').textContent = dados.arquivo;
                        document.getElementById('senhaResultadoSpan').textContent = dados.senha;
                        document.getElementById('tamanhoSpan').textContent = dados.tamanho;
                        document.getElementById('metodoSpan').textContent = dados.metodo;
                        document.getElementById('avisoDiv').innerHTML = dados.aviso || '';
                        resultadoDiv.style.display = 'block';
                        exibirNotificacao('✅ Arquivo compactado!', 'success');
                    }, 500);
                } else {
                    throw new Error(dados.error);
                }
            } catch (erro) {
                clearInterval(intervalo);
                progressoDiv.style.display = 'none';
                exibirNotificacao('❌ Erro: ' + erro.message, 'error');
            } finally {
                processando = false;
                compactarBtn.disabled = false;
            }
        }
        
        document.getElementById('downloadBtn').onclick = () => {
            const nomeArquivo = document.getElementById('nomeArquivoSpan').textContent;
            window.location.href = `/download/${nomeArquivo}`;
        };
        
        document.getElementById('novoBtn').onclick = () => {
            arquivosSelecionados = [];
            atualizarLista();
            senhaInput.value = '';
            document.getElementById('nomeSaida').value = '';
            resultadoDiv.style.display = 'none';
            fileInput.value = '';
        };
        
        document.getElementById('copiarSenhaBtn').onclick = () => {
            const senha = document.getElementById('senhaResultadoSpan').textContent;
            navigator.clipboard.writeText(senha);
            exibirNotificacao('📋 Senha copiada!', 'success');
        };
        
        compactarBtn.addEventListener('click', realizarCompactacao);
        
        console.log('🚀 Aplicação pronta! Selecione vários arquivos');
    </script>
</body>
</html>
